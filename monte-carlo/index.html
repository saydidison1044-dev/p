<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>蒙特卡罗模拟器 · 一万个平行宇宙</title>
<style>
  :root{
    --bg0:#070912; --bg1:#0d1220; --glass:rgba(20,26,44,.55);
    --line:rgba(255,255,255,.08); --txt:#e8ecf6; --dim:#8b94ad;
    --gold:#f5c451; --teal:#4dffd0; --red:#ff5d7a; --green:#5dffa6;
    --accent:#7c9cff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,"PingFang SC","Helvetica Neue",Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 800px at 70% -10%, #16203c 0%, var(--bg1) 40%, var(--bg0) 100%);
    color:var(--txt); overflow:hidden;
  }
  #scene{position:fixed;inset:0;z-index:0}
  /* ---------- 左侧控制台 ---------- */
  .panel{
    position:fixed;z-index:10;background:var(--glass);
    backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);
    border:1px solid var(--line);border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,.45);
  }
  #controls{top:22px;left:22px;width:288px;padding:20px 20px 16px}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .brand .dot{width:10px;height:10px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,var(--teal),#1b8d77);
    box-shadow:0 0 14px var(--teal)}
  .brand h1{font-size:16px;font-weight:700;letter-spacing:.5px}
  .sub{font-size:11.5px;color:var(--dim);margin:6px 0 16px;line-height:1.5}
  .ctl{margin-bottom:13px}
  .ctl label{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:6px}
  .ctl label b{color:var(--gold);font-weight:600;font-variant-numeric:tabular-nums}
  input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:4px;
    background:linear-gradient(90deg,var(--accent),#2a3252);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:#fff;cursor:pointer;box-shadow:0 0 0 4px rgba(124,156,255,.25)}
  .btns{display:flex;gap:9px;margin-top:6px}
  button{flex:1;padding:11px 0;border:none;border-radius:12px;font-size:13px;font-weight:600;
    cursor:pointer;transition:transform .1s ease,filter .15s ease;color:#0a0d16}
  button:active{transform:scale(.97)}
  #run{background:linear-gradient(135deg,var(--teal),#2bd6a8)}
  #reset{background:rgba(255,255,255,.1);color:var(--txt)}
  #rotate{flex:0 0 44px;background:rgba(255,255,255,.1);color:var(--txt);font-size:15px}
  .hint{font-size:10.5px;color:var(--dim);margin-top:12px;line-height:1.5;
    border-top:1px solid var(--line);padding-top:10px}
  /* ---------- 右侧结果面板 ---------- */
  #stats{top:22px;right:22px;width:268px;padding:18px 20px}
  #stats h2{font-size:13px;color:var(--dim);font-weight:600;margin-bottom:14px;
    text-transform:uppercase;letter-spacing:1px}
  .stat{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;
    border-bottom:1px dashed var(--line)}
  .stat:last-of-type{border-bottom:none}
  .stat .k{font-size:12px;color:var(--dim)}
  .stat .v{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
  .v.good{color:var(--green)} .v.bad{color:var(--red)} .v.neu{color:var(--gold)}
  .lesson{margin-top:14px;padding:13px;border-radius:13px;
    background:linear-gradient(135deg,rgba(245,196,81,.12),rgba(124,156,255,.08));
    border:1px solid rgba(245,196,81,.25);font-size:11.5px;line-height:1.6;color:#f0e7c8}
  .lesson b{color:var(--gold)}
  /* ---------- 图例 ---------- */
  #legend{bottom:22px;left:50%;transform:translateX(-50%);padding:9px 18px;
    display:flex;gap:18px;align-items:center;font-size:11px;color:var(--dim)}
  .leg{display:flex;align-items:center;gap:7px}
  .swatch{width:22px;height:5px;border-radius:3px}
  @media (max-width:760px){
    #controls{width:calc(100vw - 44px)} #stats{display:none}
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div id="controls" class="panel">
  <div class="brand"><span class="dot"></span><h1>蒙特卡罗模拟器</h1></div>
  <div class="sub">同一个决策，在一万个平行宇宙里各跑一遍。<br>看看你的命运到底有多依赖运气。</div>

  <div class="ctl">
    <label>初始资金 <b id="capV">¥100,000</b></label>
    <input id="cap" type="range" min="10000" max="2000000" step="10000" value="100000">
  </div>
  <div class="ctl">
    <label>预期年化收益 μ <b id="muV">7%</b></label>
    <input id="mu" type="range" min="-10" max="30" step="0.5" value="7">
  </div>
  <div class="ctl">
    <label>波动率（风险）σ <b id="sigV">15%</b></label>
    <input id="sig" type="range" min="1" max="80" step="1" value="15">
  </div>
  <div class="ctl">
    <label>时间跨度 <b id="yrV">20 年</b></label>
    <input id="yr" type="range" min="1" max="40" step="1" value="20">
  </div>
  <div class="ctl">
    <label>平行宇宙数量 <b id="nV">400</b></label>
    <input id="n" type="range" min="50" max="800" step="50" value="400">
  </div>
  <div class="ctl">
    <label>「爆仓」线（跌破即出局）<b id="ruinV">50%</b></label>
    <input id="ruin" type="range" min="0" max="90" step="5" value="50">
  </div>

  <div class="btns">
    <button id="run">▶ 重新模拟</button>
    <button id="reset">视角复位</button>
    <button id="rotate" title="自动旋转">⟳</button>
  </div>
  <div class="hint">拖动旋转 · 滚轮缩放 · 右键平移。每条发光的线 = 一种可能的人生。</div>
</div>

<div id="stats" class="panel">
  <h2>一万个结局</h2>
  <div class="stat"><span class="k">期末·中位数</span><span class="v neu" id="s_med">—</span></div>
  <div class="stat"><span class="k">期末·平均值</span><span class="v neu" id="s_mean">—</span></div>
  <div class="stat"><span class="k">最幸运的 10%</span><span class="v good" id="s_p90">—</span></div>
  <div class="stat"><span class="k">最倒霉的 10%</span><span class="v bad" id="s_p10">—</span></div>
  <div class="stat"><span class="k">最终亏钱的概率</span><span class="v bad" id="s_loss">—</span></div>
  <div class="stat"><span class="k">中途「爆仓」概率</span><span class="v bad" id="s_ruin">—</span></div>
  <div class="lesson" id="lesson">调整左边的参数，点「重新模拟」。</div>
</div>

<div id="legend" class="panel">
  <div class="leg"><span class="swatch" style="background:var(--red)"></span>亏损区</div>
  <div class="leg"><span class="swatch" style="background:var(--gold)"></span>持平</div>
  <div class="leg"><span class="swatch" style="background:var(--green)"></span>盈利区</div>
  <div class="leg" style="margin-left:6px">柱子 = 期末财富分布</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
/* ============ 基础场景 ============ */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x070912, 0.0042);

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 4000);
const HOME = new THREE.Vector3(58, 42, 92);   // 由 frameAll() 自动计算覆盖
const HOMET = new THREE.Vector3(0, 24, 0);
camera.position.copy(HOME);

const controls = new THREE.OrbitControls(camera, canvas);
controls.enableDamping = true; controls.dampingFactor = .07;
controls.target.copy(HOMET);
controls.autoRotateSpeed = 0.6;

scene.add(new THREE.AmbientLight(0xffffff, .7));
const key = new THREE.PointLight(0x9fc0ff, .8, 0); key.position.set(40,80,60); scene.add(key);

function resize(){
  const w=innerWidth,h=innerHeight;
  renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix();
}
addEventListener('resize',resize); resize();

/* ============ 几何常量 ============ */
const X_LEN = 70;          // 时间轴总长
const Y_TOP = 50;          // 价值轴最大高度
const Z_SPREAD = 26;       // 路径在深度方向的铺开
let group = new THREE.Group(); scene.add(group);
let framed = false;

/* ============ 工具函数 ============ */
function gauss(){ // Box-Muller 标准正态
  let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
function fmt(x){
  if(x>=1e8) return '¥'+(x/1e8).toFixed(2)+'亿';
  if(x>=1e4) return '¥'+(x/1e4).toFixed(1)+'万';
  return '¥'+Math.round(x).toLocaleString();
}
function percentile(sorted,p){
  const i=(sorted.length-1)*p, lo=Math.floor(i), hi=Math.ceil(i);
  return sorted[lo]+(sorted[hi]-sorted[lo])*(i-lo);
}
// 按「当前财富 / 初始」给颜色：亏→红, 平→金, 盈→绿
const _c = new THREE.Color();
function colorForRatio(ratio){
  let l = Math.log(Math.max(ratio,1e-4));
  l = Math.max(-0.9, Math.min(0.9, l));
  const h = ((l+0.9)/1.8)*0.38;          // 0(红)→0.38(绿)
  _c.setHSL(h, 0.85, 0.56); return _c;
}
function makeLabel(text, x,y,z, scale=5, col='#9aa4bd'){
  const c=document.createElement('canvas'); c.width=256; c.height=64;
  const g=c.getContext('2d'); g.fillStyle=col; g.font='600 34px -apple-system,PingFang SC,sans-serif';
  g.textAlign='center'; g.textBaseline='middle'; g.fillText(text,128,32);
  const t=new THREE.CanvasTexture(c);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthWrite:false}));
  s.position.set(x,y,z); s.scale.set(scale*4,scale,1); return s;
}

/* ============ 读参数 ============ */
const el = id=>document.getElementById(id);
function params(){
  return {
    cap:+el('cap').value, mu:+el('mu').value/100, sig:+el('sig').value/100,
    yr:+el('yr').value, n:+el('n').value, ruin:+el('ruin').value/100
  };
}

/* ============ 核心模拟 + 绘制 ============ */
function simulate(){
  // 清空旧场景
  group.traverse(o=>{ if(o.geometry)o.geometry.dispose(); if(o.material)o.material.dispose(); });
  scene.remove(group); group=new THREE.Group(); scene.add(group);

  const p=params();
  const steps = p.yr*12, dt=1/12;            // 月度步进
  const drift=(p.mu-0.5*p.sig*p.sig)*dt, vol=p.sig*Math.sqrt(dt);
  const ruinLine = p.cap*p.ruin;

  // 1) 跑所有路径，记录数值
  const paths=[], finals=[]; let everRuined=0, minV=Infinity;
  for(let i=0;i<p.n;i++){
    const v=new Float32Array(steps+1); v[0]=p.cap;
    let ruined=false;
    for(let t=1;t<=steps;t++){
      v[t]=v[t-1]*Math.exp(drift+vol*gauss());
      if(p.ruin>0 && v[t]<=ruinLine) ruined=true;
      if(v[t]<minV) minV=v[t];
    }
    if(ruined) everRuined++;
    paths.push(v); finals.push(v[steps]);
  }
  const sortedF=[...finals].sort((a,b)=>a-b);

  // 2) Y 轴映射（线性，按 97 分位裁剪离群值，保留直觉）
  const yMin=0, yMax=Math.max(percentile(sortedF,0.97), p.cap*1.6, minV);
  const yOf=v=>Math.max(0,Math.min(Y_TOP, (v-yMin)/(yMax-yMin)*Y_TOP));
  const xOf=t=>(t/steps)*X_LEN - X_LEN/2;

  // 3) 画路径（顶点着色 + 加色混合发光）
  for(let i=0;i<p.n;i++){
    const v=paths[i], pos=new Float32Array((steps+1)*3), col=new Float32Array((steps+1)*3);
    const z=(i/(p.n-1)-0.5)*Z_SPREAD + (Math.random()-0.5)*1.2;
    for(let t=0;t<=steps;t++){
      pos[t*3]=xOf(t); pos[t*3+1]=yOf(v[t]); pos[t*3+2]=z;
      const c=colorForRatio(v[t]/p.cap);
      col[t*3]=c.r; col[t*3+1]=c.g; col[t*3+2]=c.b;
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.BufferAttribute(pos,3));
    g.setAttribute('color',new THREE.BufferAttribute(col,3));
    const m=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,
      opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false});
    group.add(new THREE.Line(g,m));
  }

  // 4) 期末分布直方图（在时间轴尽头，向观察者方向伸出）
  const BINS=26, lo=yMin, hi=yMax, bw=(hi-lo)/BINS, counts=new Array(BINS).fill(0);
  finals.forEach(f=>{ let b=Math.floor((Math.min(f,hi-1e-6)-lo)/bw); b=Math.max(0,Math.min(BINS-1,b)); counts[b]++; });
  const maxC=Math.max(...counts);
  for(let b=0;b<BINS;b++){
    if(!counts[b])continue;
    const len=(counts[b]/maxC)*Z_SPREAD*1.15+0.4;
    const geo=new THREE.BoxGeometry(1.4, (Y_TOP/BINS)*0.8, len);
    const c=colorForRatio((lo+(b+0.5)*bw)/p.cap);
    const mat=new THREE.MeshBasicMaterial({color:c.clone(),transparent:true,opacity:0.82});
    const bar=new THREE.Mesh(geo,mat);
    bar.position.set(X_LEN/2+3.5, (b+0.5)*(Y_TOP/BINS), -Z_SPREAD/2+len/2);
    group.add(bar);
  }

  // 5) 参考面（初始资金基线）+ 爆仓线
  addPlane(yOf(p.cap), 0x7c9cff, 0.10);
  if(p.ruin>0) addPlane(yOf(ruinLine), 0xff5d7a, 0.13);

  // 6) 坐标轴 + 标签
  const grid=new THREE.GridHelper(X_LEN+10, 14, 0x2a3354, 0x161d33);
  grid.position.y=0; group.add(grid);
  addLabels(p, yOf, xOf, steps, yMin, yMax);

  // 7) 更新右侧数据
  updateStats(p, sortedF, everRuined);

  // 8) 首次模拟时，把整个场景自动框到正中央
  if(!framed){ frameAll(); framed=true; }
}

// 计算 group 的包围盒，自动调整相机让整个 3D 完整居中
function frameAll(){
  const box=new THREE.Box3().setFromObject(group);
  if(box.isEmpty()) return;
  const sphere=box.getBoundingSphere(new THREE.Sphere());
  const r=sphere.radius;
  const vFov=camera.fov*Math.PI/180;
  const fitH=r/Math.sin(vFov/2);
  const fitW=r/Math.sin(Math.atan(Math.tan(vFov/2)*camera.aspect));
  const dist=Math.max(fitH,fitW)*1.18;
  const dir=new THREE.Vector3(0.5,0.42,1).normalize();
  HOMET.copy(sphere.center);
  HOME.copy(sphere.center).add(dir.multiplyScalar(dist));
  camera.position.copy(HOME);
  controls.target.copy(HOMET);
  camera.near=Math.max(dist/200,0.1); camera.far=dist*8;
  camera.updateProjectionMatrix(); controls.update();
}

function addPlane(y, color, op){
  const g=new THREE.PlaneGeometry(X_LEN+8, Z_SPREAD+6);
  const m=new THREE.MeshBasicMaterial({color,transparent:true,opacity:op,side:THREE.DoubleSide,depthWrite:false});
  const pl=new THREE.Mesh(g,m); pl.rotation.x=-Math.PI/2; pl.position.set(0,y,0); group.add(pl);
}

function addLabels(p, yOf, xOf, steps, yMin, yMax){
  // 时间轴
  group.add(makeLabel('开始', xOf(0), -4, Z_SPREAD/2+4, 5));
  group.add(makeLabel(p.yr+' 年后', xOf(steps), -4, Z_SPREAD/2+4, 5, '#c9d2ea'));
  // 价值轴：标几个金额
  const ticks=[yMin, p.cap, (yMin+yMax)/2, yMax];
  ticks.forEach(v=>{ if(v<=0)return;
    group.add(makeLabel(fmt(v), -X_LEN/2-9, yOf(v), Z_SPREAD/2+2, 4.4,'#8b94ad'));
  });
  group.add(makeLabel('初始资金', -X_LEN/2-9, yOf(p.cap)+3.2, Z_SPREAD/2+2, 4,'#7c9cff'));
}

function updateStats(p, sortedF, everRuined){
  const med=percentile(sortedF,0.5);
  const mean=sortedF.reduce((a,b)=>a+b,0)/sortedF.length;
  const p90=percentile(sortedF,0.9), p10=percentile(sortedF,0.1);
  const lossProb=sortedF.filter(f=>f<p.cap).length/sortedF.length;
  const ruinProb=everRuined/p.n;
  el('s_med').textContent=fmt(med);
  el('s_mean').textContent=fmt(mean);
  el('s_p90').textContent=fmt(p90);
  el('s_p10').textContent=fmt(p10);
  el('s_loss').textContent=(lossProb*100).toFixed(0)+'%';
  el('s_ruin').textContent=(ruinProb*100).toFixed(0)+'%';
  el('s_med').className='v '+(med>=p.cap?'good':'bad');
  el('s_mean').className='v '+(mean>=p.cap?'good':'bad');

  // 动态「塔勒布提醒」
  let msg='';
  if(p.ruin>0 && ruinProb>0.15){
    msg=`<b>⚠ 别只盯着平均值。</b>平均能赚钱，但有 ${(ruinProb*100).toFixed(0)}% 的人生中途就跌破了爆仓线——`+
        `一旦出局，再高的长期收益也与你无关。这正是塔勒布说的：<b>先活下来，再谈赚钱。</b>`;
  } else if(mean>=p.cap && lossProb>0.35){
    msg=`<b>正期望 ≠ 稳赚。</b>平均结局是赚的，但仍有 ${(lossProb*100).toFixed(0)}% 的平行宇宙里你是亏的。`+
        `<b>一次好结果不代表是好决策，一次坏结果也不代表你错了</b>——区分运气和实力。`;
  } else if(mean>med*1.4){
    msg=`<b>平均数在骗你。</b>平均 ${fmt(mean)} 远高于中位数 ${fmt(med)}：少数极端幸运者抬高了平均，`+
        `大多数人其实落在更低处。看分布，别看平均。`;
  } else if(lossProb<0.1){
    msg=`这套参数相当稳健，绝大多数平行宇宙都在盈利。但记住：<b>现实里黑天鹅不会出现在你的历史样本里</b>，调高波动率试试。`;
  } else {
    msg=`每条线都是一种「本可能发生」的人生。<b>你真实经历的只是其中一条</b>——别把单一结果当成必然。`;
  }
  el('lesson').innerHTML=msg;
}

/* ============ 交互 ============ */
['cap','mu','sig','yr','n','ruin'].forEach(id=>{
  el(id).addEventListener('input',()=>{
    el('capV').textContent=fmt(+el('cap').value);
    el('muV').textContent=(+el('mu').value)+'%';
    el('sigV').textContent=(+el('sig').value)+'%';
    el('yrV').textContent=(+el('yr').value)+' 年';
    el('nV').textContent=el('n').value;
    el('ruinV').textContent=(+el('ruin').value)+'%';
  });
});
el('run').onclick=simulate;
el('reset').onclick=()=>{ frameAll(); };
el('rotate').onclick=()=>{ controls.autoRotate=!controls.autoRotate;
  el('rotate').style.color=controls.autoRotate?'#4dffd0':'#e8ecf6'; };

/* ============ 渲染循环 ============ */
(function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene,camera); })();
simulate();
</script>
</body>
</html>
